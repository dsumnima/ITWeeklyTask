<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1</title>
</head>

<body>
    <h1>Image Formatting Example</h1>

    <!-- Image 1 with 5px border -->
    <p>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Altja_j%C3%B5gi_Lahemaal.jpg/1280px-Altja_j%C3%B5gi_Lahemaal.jpg"
            border="5" alt="Image 1" height="20%" width="20%">
    </p>

    <!-- Image 2 resized and made clickable -->
    <p>
        <a href="https://blog.3bee.com/_next/image/?url=https%3A%2F%2Fapi-backend-assets.s3.eu-south-1.amazonaws.com%2Fprivate%2Ffiler_public%2F6a%2Fb8%2F6ab8a61c-d648-44f4-9dd1-5a947667e662%2F84e63c09-1739-4d10-8380-346f9eb211db.jpg&w=1920&q=75"
            target="_blank">
            <img src="https://blog.3bee.com/_next/image/?url=https%3A%2F%2Fapi-backend-assets.s3.eu-south-1.amazonaws.com%2Fprivate%2Ffiler_public%2F6a%2Fb8%2F6ab8a61c-d648-44f4-9dd1-5a947667e662%2F84e63c09-1739-4d10-8380-346f9eb211db.jpg&w=1920&q=75"
                alt="Image 2" width="30%" height="30%">
        </a>
        <br>Tap to open original image
    </p>

    <!-- Image 3 aligned right -->
    <p>
        <img src="https://natureconservancy-h.assetsadobe.com/is/image/content/dam/tnc/nature/en/photos/w/o/WOPA160517_D056-resized.jpg?crop=864%2C0%2C1728%2C2304&wid=1200&hei=1600&scl=1.44"
            align="right" alt="Image 3" width="30%" height="30%" hspace="10" vspace="10">
        This text wraps around Image 3 which is aligned to the right.
    </p>

    <!-- Image 4 with 50px horizontal and vertical space -->
    <p>
        <img src="https://blog.3bee.com/_next/image/?url=https%3A%2F%2Fapi-backend-assets.s3.eu-south-1.amazonaws.com%2Fprivate%2Ffiler_public%2F6a%2Fb8%2F6ab8a61c-d648-44f4-9dd1-5a947667e662%2F84e63c09-1739-4d10-8380-346f9eb211db.jpg&w=1920&q=75"
            alt="Image 4" hspace="50" vspace="50" width="70%" height="70%">
    </p>
    <p>Text below Image 4 with 50px space around it.</p>

</body>

</html>

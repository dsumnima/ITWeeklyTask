<!DOCTYPE html>
<html>
<head>
    <title>Q7</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            text-align: center;
        }
        th {
            background-color: teal;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
        }
        .odd { background-color: #d3d3d3; }
        .even { background-color: #f2f2f2; }
    </style>
</head>
<body>

<table border="1">
    <tr>
        <th>S.N.</th>
        <th>Name</th>
        <th>Image</th>
    </tr>

<script>
    for (var i = 1; i <= 4; i++) {
        var rowClass = (i % 2 == 0) ? "even" : "odd";

        document.write("<tr class='" + rowClass + "'>");
        document.write("<td>" + i + "</td>");
        document.write("<td>Name " + i + "</td>");
        document.write("<td>" + i + ".jpg</td>");
        document.write("</tr>");
    }
</script>

</table>

</body>
</html>

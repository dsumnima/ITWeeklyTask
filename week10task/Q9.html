<!DOCTYPE html>
<html>
<head>
    <title>Q9</title>
</head>
<body>

<script>
    var numbers = [2, 3, 4, 5];

    var sum = 0;
    var product = 1;

    for (var i = 0; i < numbers.length; i++) {
        sum += numbers[i];
        product *= numbers[i];
    }

    document.write("Sum = " + sum + "<br>");
    document.write("Product = " + product);
</script>

</body>
</html>
